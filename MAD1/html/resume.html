<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume - Anurag Basak</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --primary-color: #2c5aa0;
            --accent-color: #d4a574;
            --text-dark: #1a1a1a;
            --text-light: #666666;
            --bg-light: #f9f8f6;
            --border-color: #e0dcd5;
            --hover-bg: #f0ede7;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            background-color: var(--bg-light);
            line-height: 1.6;
            letter-spacing: 0.3px;
        }

        .header {
            background: white;
            padding: 2rem 5%;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }

        .header a {
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            margin-right: 2rem;
            position: relative;
            transition: color 0.3s ease;
        }

        .header a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-color);
            transition: width 0.3s ease;
        }

        .header a:hover {
            color: var(--primary-color);
        }

        .header a:hover::after {
            width: 100%;
        }

        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 5%;
            min-height: calc(100vh - 200px);
            animation: fadeIn 0.6s ease-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .main h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 3rem;
            letter-spacing: -1px;
            text-align: center;
        }

        .resume-container {
            background: white;
            padding: 3.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            text-align: center;
            width: 100%;
            max-width: 500px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .resume-container:hover {
            border-color: var(--accent-color);
            box-shadow: 0 16px 40px rgba(212, 165, 116, 0.15);
            transform: translateY(-4px);
        }

        .resume-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .resume-description {
            color: var(--text-light);
            font-size: 1.05rem;
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }

        .resume-description strong {
            color: var(--primary-color);
            font-weight: 600;
        }

        .download-button {
            display: inline-block;
            padding: 1.1rem 2.8rem;
            background: linear-gradient(135deg, var(--primary-color) 0%, #1e3f5a 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(44, 90, 160, 0.2);
        }

        .download-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3f5a 0%, var(--primary-color) 100%);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .download-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(44, 90, 160, 0.35);
        }

        .download-button:hover::before {
            left: 0;
        }

        .download-button::after {
            content: ' ↓';
            margin-left: 0.5rem;
        }

        .alternative-text {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .alternative-text a {
            color: var(--primary-color);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .alternative-text a:hover {
            color: var(--accent-color);
            text-decoration: underline;
        }

        .footer {
            background: white;
            padding: 2rem 5%;
            text-align: center;
            border-top: 1px solid var(--border-color);
            margin-top: 4rem;
            width: 100%;
        }

        .footer h5 {
            font-size: 0.85rem;
            color: var(--text-light);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .main {
                padding: 2rem 4%;
            }

            .main h1 {
                font-size: 2.5rem;
                margin-bottom: 2rem;
            }

            .header a {
                margin-right: 1rem;
                font-size: 0.85rem;
            }

            .resume-container {
                padding: 2rem;
                max-width: 100%;
            }

            .resume-icon {
                font-size: 3rem;
                margin-bottom: 1rem;
            }

            .download-button {
                padding: 0.9rem 2rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
<div class="header">
    <a href="./index.html">Home</a> |
    <a href="./academics.html">Academics</a> |
    <a href="./personal.html">Personal</a> |
    <a href="./contact.html">Contact</a> |
    <a href="./resume.html">Resume</a>
</div>

<div class="main">
    <h1>Resume</h1>
    <div class="resume-container">
        <span class="resume-icon">📄</span>
        <p class="resume-description">
            Download my <strong>comprehensive resume</strong> to learn more about my skills, experience, and academic achievements.
        </p>
        <a href="./Resume.pdf" class="download-button">Download Resume</a>
        <div class="alternative-text">
            <p>Resume file not found? Contact us at <a href="mailto:support@onlinedegree.iitm.ac.in">support@onlinedegree.iitm.ac.in</a></p>
        </div>
    </div>
</div>

<div class="footer">
    <h5>Anurag Basak | May Batch, 2024 | © Copyright 2026</h5>
</div>
</body>
</html>
